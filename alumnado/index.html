<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Tablón Sala de Profesorado</title>

  <meta http-equiv="refresh" content="300" />

  <style>
    :root {
      --gap: 16px;
      --bg: #0b0f14;
      --panel: #111827;
      --border: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --accent: #3b82f6; /* Azul corporativo sutil para resaltar la hora */
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden; /* ideal para TV */
    }

    /* Layout principal a pantalla completa */
    .wrap {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 420px; /* izquierda flexible, derecha fija */
      gap: var(--gap);
      padding: var(--gap);
      box-sizing: border-box;
    }

    /* Columna derecha: ahora se divide verticalmente */
    .sidebar-container {
      display: grid;
      grid-template-rows: 200px 1fr; /* Bloque superior de 200px, agenda ocupa el resto */
      gap: var(--gap);
      height: 100%;
      min-height: 0;
    }

    /* Ajuste para pantallas más estrechas */
    @media (max-width: 1100px) {
      .wrap { grid-template-columns: 1fr 360px; }
    }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; grid-template-rows: 50% 50%; }
      .sidebar-container { grid-template-rows: auto 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0; /* para que los iframes ajusten bien */
    }

    /* Estilos específicos para el nuevo bloque institucional */
/* Estilos específicos para el nuevo bloque institucional con fondo blanco */
    .panel--brand {
      padding: 20px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #ffffff; /* Fondo blanco para resaltar el logo */
    }

    .brand__logo-container {
      flex: 0 0 120px; /* Un pelín más grande para lucir el logo */
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand__logo {
      max-width: 130%;
      max-height: 130%;
      object-fit: contain;
    }

    .brand__time-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      text-align: right;
    }

    .brand__time {
      font-size: 52px; /* Ligeramente más grande */
      font-weight: 800;
      line-height: 1;
      color: #111827; /* Texto oscuro para contrastar con el fondo blanco */
      letter-spacing: -1px;
    }

    .brand__date {
      font-size: 22px; /* ¡Fecha mucho más grande! */
      font-weight: 700; /* Más negrita para que tenga presencia */
      color: #4b5563; /* Gris oscuro legible */
      margin-top: 8px;
      text-transform: capitalize;
    }

    .panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.2;
    }

    .panel__title {
      font-weight: 700;
      letter-spacing: .2px;
    }

    .panel__meta {
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
    }

    .panel__body {
      flex: 1;
      min-height: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000; /* por si tarda en cargar */
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
  </style>

  <script>
    // Fallback extra: recargar exactamente cada 5 minutos
    setTimeout(() => location.reload(), 300000);
  </script>
</head>

<body>
  <div class="wrap">
    <section class="panel">
      <div class="panel__header">
        <div class="panel__title">📌 Tablón de anuncios</div>
        <div class="panel__meta small">Actualiza cada 5 min</div>
      </div>
      <div class="panel__body">
        <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQFJtOXaEJ5hexkPY2kxRC7tP1gls02xmfIKMcqx3ymIo9br2n8kOPna2GiC39RFdcKCXaBjSRNtc4L/pubembed?start=true&loop=true&delayms=10000" frameborder="0" width="960" height="569" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
      </div>
    </section>

    <div class="sidebar-container">
      
      <header class="panel panel--brand">
        <div class="brand__logo-container">
          <img class="brand__logo" src="logoieshm.png" alt="Logo IES Hermanos Machado" onerror="this.style.display='none'; this.parentNode.innerHTML='<span style=\'font-size:12px;color:var(--muted);text-align:center\'>IES Hermanos<br>Machado</span>'" />
        </div>
        <div class="brand__time-block">
          <div class="brand__time" id="big-clock">00:00</div>
          <div class="brand__date" id="big-date">Cargando fecha...</div>
        </div>
      </header>

      <aside class="panel">
        <div class="panel__header">
          <div class="panel__title">📅 Agenda</div>
          <div class="panel__meta small">Eventos de la semana</div>
        </div>
        <div class="panel__body">
          <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=Europe%2FMadrid&showPrint=0&showTitle=0&showNav=0&showDate=0&showTabs=0&showCalendars=0&showTz=0&mode=AGENDA&src=aWVzaG5vc21hY2hhZG8ub3JnX2oxaG8ydmowanFiYW8zYjZ1Nzk5bnMwcjZjQGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=aWVzaG5vc21hY2hhZG9AaWVzaG5vc21hY2hhZG8ub3Jn&color=%23009688&color=%23b39ddb" style="border-width:0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
        </div>
      </aside>

    </div>
  </div>

  <script>
    // Reloj y fecha en formato grande
    function updateClockAndDate(){
      const now = new Date();
      
      // Formato de hora (HH:MM)
      const timeFormatter = new Intl.DateTimeFormat("es-ES", {
        timeZone: "Europe/Madrid",
        hour: "2-digit",
        minute: "2-digit"
      });
      
      // Formato de fecha largo (ej: "martes, 26 de mayo")
      const dateFormatter = new Intl.DateTimeFormat("es-ES", {
        timeZone: "Europe/Madrid",
        weekday: "long",
        day: "numeric",
        month: "long"
      });
      
      document.getElementById("big-clock").textContent = timeFormatter.format(now);
      document.getElementById("big-date").textContent = dateFormatter.format(now);
    }
    
    updateClockAndDate();
    // Actualiza el reloj cada segundo para asegurar precisión en una pantalla fija
    setInterval(updateClockAndDate, 1000);
  </script>
</body>
</html>
