<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Tablón Sala de Profesorado</title>

  <!-- Recargar cada 5 minutos (300 segundos) -->
  <meta http-equiv="refresh" content="300" />

  <style>
    :root {
      --gap: 16px;
      --bg: #0b0f14;
      --panel: #111827;
      --border: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden; /* ideal para TV */
    }

    /* Layout principal a pantalla completa */
    .wrap {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 420px; /* izquierda flexible, derecha fija */
      gap: var(--gap);
      padding: var(--gap);
      box-sizing: border-box;
    }

    /* Ajuste para pantallas más estrechas (por si acaso) */
    @media (max-width: 1100px) {
      .wrap { grid-template-columns: 1fr 360px; }
    }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; grid-template-rows: 55% 45%; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0; /* para que los iframes ajusten bien */
    }

    .panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.2;
    }

    .panel__title {
      font-weight: 700;
      letter-spacing: .2px;
    }

    .panel__meta {
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
    }

    .panel__body {
      flex: 1;
      min-height: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000; /* por si tarda en cargar */
    }

    /* Opcional: hace que el texto de cabecera no “robe” mucho espacio */
    .small {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
  </style>

  <script>
    // Fallback extra: recargar exactamente cada 5 minutos (por si algún navegador ignora meta refresh)
    setTimeout(() => location.reload(), 300000);
  </script>
</head>

<body>
  <div class="wrap">
    <!-- IZQUIERDA: Presentación de Google Slides (publicada en la web) -->
    <section class="panel">
      <div class="panel__header">
        <div class="panel__title">📌 Tablón de anuncios</div>
        <div class="panel__meta small">Actualiza cada 5 min</div>
      </div>
      <div class="panel__body">
        
        <iframe
          src="https://docs.google.com/presentation/d/e/2PACX-1vSMXRH-aO-Ffy0NdXclGNSEmsQLPbfIgeFBM7z-rmNVjxCAtL3tR2902JEVFpWkI6XHW9ACqCz6nPhk/pubembed?start=true&loop=true&delayms=10000"
          allowfullscreen="true"
          mozallowfullscreen="true"
          webkitallowfullscreen="true">
        </iframe>
      </div>
    </section>

    <!-- DERECHA: Google Calendar incrustado -->
    <aside class="panel">
      <div class="panel__header">
        <div class="panel__title">📅 Agenda</div>
        <div class="panel__meta small" id="clock"></div>
      </div>
      <div class="panel__body">
        <!--
          Pega aquí el iframe de "Integrar calendario".
          En Google Calendar: ⚙️ Ajustes → (tu calendario) → Integrar calendario → Copiar iframe
          Sugerencia: usa "mode=AGENDA" para lista, o "mode=WEEK" para semana.
        -->
        <iframe
          src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=Europe%2FMadrid&showPrint=0&showTitle=0&showNav=0&showTabs=0&showTz=0&showCalendars=0&mode=AGENDA&src=aWVzaG5vc21hY2hhZG8ub3JnX2oxaG8ydmowanFiYW8zYjZ1Nzk5bnMwcjZjQGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=aWVzaG5vc21hY2hhZG8ub3JnX3VvYTk4ZmFudjI0NWl1bmtoNjVpOWM0NjJrQGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=aWVzaG5vc21hY2hhZG9AaWVzaG5vc21hY2hhZG8ub3Jn&color=%23009688&color=%237cb342&color=%23b39ddb" style="border: 0" width="800" height="600" frameborder="0" scrolling="no""
          scrolling="no">
        </iframe>
      </div>
    </aside>
  </div>

  <script>
    // Reloj simple (Europe/Madrid) para la cabecera de la agenda
    function tick(){
      const now = new Date();
      const fmt = new Intl.DateTimeFormat("es-ES", {
        timeZone: "Europe/Madrid",
        weekday: "short",
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
      document.getElementById("clock").textContent = fmt.format(now);
    }
    tick();
    setInterval(tick, 10000);
  </script>
</body>
</html>
