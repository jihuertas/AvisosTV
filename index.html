<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablón Sala de Profesorado - Max Presentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-deep: #050a14;
            --panel-bg: #0f172a;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            --gap: 16px;
        }

        * { box-sizing: border-box; }

        body, html {
            height: 100%;
            margin: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 450px;
            height: 100vh;
            gap: var(--gap);
            padding: var(--gap);
        }

        /* --- COLUMNA IZQUIERDA (MAXIMIZADA) --- */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: var(--gap);
            height: 100%;
            min-height: 0;
        }

        /* Presentación expandida al máximo */
        .slides-panel {
            flex: 1; /* Ocupa todo el espacio vertical que pueda */
            background: #000;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
        }

        .slides-panel iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
        }

        /* Contenedor Inferior Pequeño para la Frase del Día */
        .daily-quote-banner {
            height: 75px; /* Altura muy pequeña y estilizada */
            background: var(--panel-bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .daily-quote-banner::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 5px;
            background: var(--accent-blue);
        }

        .quote-layout {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 16px;
        }

        .quote-tag {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .quote-text-container {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            font-style: italic;
            color: var(--text-main);
        }

        #quote-author {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-style: normal;
            color: var(--text-muted);
            margin-left: 8px;
            font-weight: 600;
        }

        /* --- COLUMNA DERECHA --- */
        .right-column {
            display: grid;
            grid-template-rows: 130px 1fr;
            gap: var(--gap);
            min-height: 0;
        }

        .brand-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
        }

        .logo-box {
            height: 80px;
            width: 80px;
            background: white;
            border-radius: 10px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .time-box {
            text-align: right;
        }

        #clock {
            font-size: 52px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -1px;
        }

        #date {
            font-size: 15px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: capitalize;
        }

        .agenda-panel {
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .panel-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        .panel-header h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agenda-container {
            flex: 1;
            position: relative;
        }

        .calendar-scaler {
            width: 111.1%;
            height: 111.1%;
            transform: scale(0.9);
            transform-origin: top left;
        }

        iframe { width: 100%; height: 100%; border: 0; }

        .login-tag {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="layout-grid">
        
        <div class="left-column">
            <div class="slides-panel">
                <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQFJtOXaEJ5hexkPY2kxRC7tP1gls02xmfIKMcqx3ymIo9br2n8kOPna2GiC39RFdcKCXaBjSRNtc4L/pubembed?start=true&loop=true&delayms=10000"></iframe>
            </div>
            
            <div class="daily-quote-banner">
                <div class="quote-layout">
                    <div class="quote-tag">Frase del día</div>
                    <div class="quote-text-container">
                        <span id="quote-text">Cargando pensamiento del día...</span>
                        <span id="quote-author"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-column">
            <header class="brand-panel">
                <div class="logo-box">
                    <img src="logoieshm.png" alt="IES Logo" onerror="this.style.display='none'">
                </div>
                <div class="time-box">
                    <div id="clock">00:00</div>
                    <div id="date">Cargando...</div>
                </div>
            </header>

            <aside class="agenda-panel">
                <div class="panel-header">
                    <h2><i class="fa-solid fa-calendar-day" style="color: var(--accent-blue);"></i> Agenda de la semana</h2>
                </div>
                <div class="agenda-container">
                    <div class="calendar-scaler">
                        <iframe src="https://calendar.google.com/calendar/embed?height=800&wkst=2&ctz=Europe%2FMadrid&showPrint=0&showTitle=0&showNav=0&showDate=0&showTabs=0&showCalendars=0&showTz=0&mode=AGENDA&src=aWVzaG5vc21hY2hhZG8ub3JnX2oxaG8ydmowanFiYW8zYjZ1Nzk5bnMwcjZjQGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=aWVzaG5vc21hY2hhZG9AaWVzaG5vc21hY2hhZG8ub3Jn&color=%23009688&color=%23b39ddb"></iframe>
                    </div>
                    <div class="login-tag"><i class="fa-solid fa-lock"></i> Google Login</div>
                </div>
            </aside>
        </div>

    </div>

    <script>
        // --- RELOJ Y FECHA ---
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = new Intl.DateTimeFormat('es-ES', {
                hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Madrid'
            }).format(now);

            document.getElementById('date').textContent = new Intl.DateTimeFormat('es-ES', {
                weekday: 'long', day: 'numeric', month: 'long', timeZone: 'Europe/Madrid'
            }).format(now);
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- BANCO DE FRASES MOTIVACIONALES ---
        const phrases = [
            { text: "Caminante, no hay camino, se hace camino al andar.", author: "— Antonio Machado" },
            { text: "La educación es el arma más poderosa que puedes usar para cambiar el mundo.", author: "— Nelson Mandela" },
            { text: "La mente que se abre a una nueva idea jamás vuelve a su tamaño original.", author: "— Albert Einstein" },
            { text: "El aprendizaje nunca agota a la mente.", author: "— Leonardo da Vinci" },
            { text: "Lo que tenemos que aprender a hacer, lo aprendemos haciendo.", author: "— Aristóteles" },
            { text: "Si buscas resultados distintos, no hagas siempre lo mismo.", author: "— Albert Einstein" },
            { text: "La inteligencia consiste no solo en el conocimiento, sino en la destreza de aplicar los conocimientos.", author: "— Aristóteles" },
            { text: "El éxito es la suma de pequeños esfuerzos, repetidos día tras día.", author: "— Robert Collier" },
            { text: "La educación no es preparación para la vida; la educación es la vida en sí misma.", author: "— John Dewey" },
            { text: "Siempre parece imposible hasta que se hace.", author: "— Nelson Mandela" },
            { text: "Aprender sin reflexionar es malgastar la energía.", author: "— Confucio" },
            { text: "Tus mejores profesores son tus mayores errores.", author: "— Ralph Waldo Emerson" },
            { text: "La paciencia es amarga, pero su fruto es dulce.", author: "— Jean-Jacques Rousseau" },
            { text: "El sabio no dice todo lo que piensa, pero siempre piensa todo lo que dice.", author: "— Aristóteles" },
            { text: "No heredamos la tierra de nuestros ancestros, la custodiamos para nuestros hijos.", author: "— Antoine de Saint-Exupéry" }
        ];

        // --- ALGORITMO DE FRASE ÚNICA POR DÍA ---
        function setDailyQuote() {
            const now = new Date();
            // Creamos un número único basado en el año, mes y día actual
            const dateSeed = now.getFullYear() * 1000 + (now.getMonth() + 1) * 100 + now.getDate();
            
            // Usamos la semilla matemática para seleccionar siempre el mismo índice durante las 24h
            const index = dateSeed % phrases.length;
            const dailySelection = phrases[index];

            document.getElementById('quote-text').textContent = `"${dailySelection.text}"`;
            document.getElementById('quote-author').textContent = dailySelection.author;
        }
        
        setDailyQuote();

        // Recarga completa automática del sistema cada 10 minutos
        setTimeout(() => location.reload(), 600000);
    </script>
</body>
</html>
