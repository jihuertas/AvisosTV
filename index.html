<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Tablón Alumnado</title>

  <meta http-equiv="refresh" content="300" />

  <style>
    :root {
      --gap: 16px;
      --bg: #0b0f14;
      --panel: #161e2e; /* Un tono oscuro más pulido */
      --border: rgba(255,255,255,.08);
      --text: rgba(255,255,255,.95);
      --muted: rgba(255,255,255,.60);
      --accent: #3b82f6; 
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden; /* Evita scroll en la pantalla general de la TV */
    }

    /* Layout principal a pantalla completa */
    .wrap {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 440px; /* Un poco más de ancho para la agenda */
      gap: var(--gap);
      padding: var(--gap);
      box-sizing: border-box;
    }

    /* Columna izquierda: Fuerza la proporción 16:9 de las diapositivas */
    .main-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .slides-wrapper {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Contenedor mágico 16:9 para evitar franjas negras */
    .aspect-16-9 {
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 100%;
    }

    /* Columna derecha: Se divide verticalmente maximizando la agenda */
    .sidebar-container {
      display: grid;
      grid-template-rows: 140px 1fr; /* Reducido de 200px a 140px para dar más espacio abajo */
      gap: var(--gap);
      height: 100%;
      min-height: 0;
    }

    /* Ajustes adaptativos */
    @media (max-width: 1100px) {
      .wrap { grid-template-columns: 1fr 360px; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0; 
    }

    /* Bloque institucional integrado con el modo oscuro */
    .panel--brand {
      padding: 16px 20px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--panel);
    }

    .brand__logo-container {
      flex: 0 0 100px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand__logo {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter: drop-shadow(0px 2px 8px rgba(0,0,0,0.2));
    }

    .brand__time-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      text-align: right;
    }

    .brand__time {
      font-size: 56px; 
      font-weight: 800;
      line-height: 1;
      color: var(--text); 
      letter-spacing: -1px;
    }

    .brand__date {
      font-size: 18px; 
      font-weight: 600; 
      color: var(--muted); 
      margin-top: 4px;
      text-transform: capitalize;
    }

    .panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.2;
      background: rgba(255,255,255,0.02);
    }

    .panel__title {
      font-weight: 700;
      letter-spacing: .2px;
    }

    .panel__meta {
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
    }

    .panel__body {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    /* Botón Google de la agenda integrado discretamente */
    .login-btn {
      position: absolute; 
      bottom: 10px; 
      right: 10px;
      padding: 6px 12px; 
      background: rgba(255, 255, 255, 0.08); 
      color: var(--text);
      border: 1px solid var(--border); 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 11px;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    .login-btn:hover { background: rgba(255, 255, 255, 0.15); }
  </style>

  <script>
    // Recargar exactamente cada 5 minutos
    setTimeout(() => location.reload(), 300000);
  </script>
</head>

<body>
  <div class="wrap">
    
    <div class="main-container">
      <section class="panel" style="height: 100%;">
        <div class="panel__header">
          <div class="panel__title">📌 Tablón de anuncios</div>
          <div class="panel__meta small">Actualiza cada 5 min</div>
        </div>
        <div class="panel__body slides-wrapper">
          <div class="aspect-16-9">
            <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQFJtOXaEJ5hexkPY2kxRC7tP1gls02xmfIKMcqx3ymIo9br2n8kOPna2GiC39RFdcKCXaBjSRNtc4L/pubembed?start=true&loop=true&delayms=10000" frameborder="0" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
          </div>
        </div>
      </section>
    </div>

    <div class="sidebar-container">
      
      <header class="panel panel--brand">
        <div class="brand__logo-container">
          <img class="brand__logo" src="logoieshm.png" alt="Logo IES Hermanos Machado" onerror="this.style.display='none'; this.parentNode.innerHTML='<span style=\'font-size:12px;color:var(--muted);text-align:center\'>IES Hermanos<br>Machado</span>'" />
        </div>
        <div class="brand__time-block">
          <div class="brand__time" id="big-clock">00:00</div>
          <div class="brand__date" id="big-date">Cargando fecha...</div>
        </div>
      </header>

      <aside class="panel">
        <div class="panel__header">
          <div class="panel__title">📅 Agenda</div>
          <div class="panel__meta small">Eventos de la semana</div>
        </div>
        <div class="panel__body">
          <iframe src="https://calendar.google.com/calendar/embed?height=800&wkst=2&ctz=Europe%2FMadrid&showPrint=0&showTitle=0&showNav=0&showDate=0&showTabs=0&showCalendars=0&showTz=0&mode=AGENDA&src=aWVzaG5vc21hY2hhZG8ub3JnX2oxaG8ydmowanFiYW8zYjZ1Nzk5bnMwcjZjQGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=aWVzaG5vc21hY2hhZG9AaWVzaG5vc21hY2hhZG8ub3Jn&color=%23009688&color=%23b39ddb" style="border-width:0" frameborder="0" scrolling="yes"></iframe>
          <button class="login-btn" onclick="window.location.href='https://accounts.google.com/ServiceLogin?continue=https://calendar.google.com/calendar/embed'">🔑 Login Google</button>
        </div>
      </aside>

    </div>
  </div>

  <script>
    function updateClockAndDate(){
      const now = new Date();
      
      const timeFormatter = new Intl.DateTimeFormat("es-ES", {
        timeZone: "Europe/Madrid",
        hour: "2-digit",
        minute: "2-digit"
      });
      
      const dateFormatter = new Intl.DateTimeFormat("es-ES", {
        timeZone: "Europe/Madrid",
        weekday: "long",
        day: "numeric",
        month: "long"
      });
      
      document.getElementById("big-clock").textContent = timeFormatter.format(now);
      document.getElementById("big-date").textContent = dateFormatter.format(now);
    }
    
    updateClockAndDate();
    setInterval(updateClockAndDate, 1000);
  </script>
</body>
</html>
